name: move_files_to_directory
summary: Publish one or multiple files or directories to the same output directory.
description: |
  This component copies one or multiple files or directories
  to the same destination directory, creating the output directory if it doesn't
  exist.
authors:
  - __merge__: /src/_authors/dorien_roosen.yaml
    roles: [ maintainer ]

argument_groups:
  - name: Inputs
    arguments:
      - name: "--input"
        type: file
        direction: input
        required: true
        multiple: true
        description: Paths of the files or directories that will be copied into the output directory.
      - name: "--file_id"
        type: string
        multiple: true
        description: |
          Optional file IDs corresponding to each input file. 
          If provided, must match the number of input files. 
  - name: Outputs
    arguments:
      - name: "--output"
        type: file
        direction: output
        required: true
        description: Path to output directory.
      - name: "--output_summary"
        type: file
        required: false
        direction: output
        example: summary.csv
        description: If provided, a csv containing the base filename and file ID per output file.
  - name: Options
    arguments:
      - name: "--keep_symbolic_links"
        type: boolean_true
        description: When set, symbolic links are preserved as symbolic links in the output directory. By default, symbolic links are dereferenced and the target file is copied.

resources:
  - type: bash_script
    path: script.sh

test_resources:
  - type: bash_script
    path: test.sh

engines:
  - type: docker
    image: debian:latest
    setup:
      - type: apt
        packages:
          - procps
  - type: native

runners:
  - type: executable
  - type: nextflow
